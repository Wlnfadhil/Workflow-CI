yaml
name: SMSML CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  mlops-pipeline:

    runs-on: ubuntu-latest

    steps:

    # =====================================================
    # CHECKOUT REPOSITORY
    # =====================================================

    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    # =====================================================
    # SETUP PYTHON
    # =====================================================

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: "3.12.7"

    # =====================================================
    # CHECK ENV
    # =====================================================

    - name: Check Env
      run: |
        python --version
        pip --version
        pwd
        ls

    # =====================================================
    # INSTALL DEPENDENCIES
    # =====================================================

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

        if [ -f Membangun_model/requirements.txt ]; then
          pip install -r Membangun_model/requirements.txt
        fi

    # =====================================================
    # RUN MLFLOW PROJECT
    # =====================================================

    - name: Run mlflow project
      env:
        MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      run: |
        python Membangun_model/modelling.py

    # =====================================================
    # GET LATEST MLFLOW RUN ID
    # =====================================================

    - name: Get latest MLflow run_id
      id: get_run_id
      run: |
        RUN_ID=$(find mlruns -name meta.yaml | head -n 1 | awk -F'/' '{print $(NF-1)}')
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Latest MLflow Run ID: $RUN_ID"

    # =====================================================
    # INSTALL PYTHON DEPENDENCIES
    # =====================================================

    - name: Install Python dependencies
      run: |
        pip install mlflow docker

    # =====================================================
    # UPLOAD TO GITHUB ARTIFACT
    # =====================================================

    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: smsml-mlflow-artifacts
        path: |
          mlruns/
          mlartifacts/
          preprocessing/artifacts/

    # =====================================================
    # BUILD DOCKER MODEL
    # =====================================================

    - name: Build Docker Model
      env:
        MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      run: |
        MODEL_PATH=$(find mlartifacts -type d -path "*/artifacts" | head -n 1)

        echo "Model Path: $MODEL_PATH"

        mlflow models build-docker \
        -m "$MODEL_PATH" \
        -n "smsml-xgboost:v1" \
        --env-manager local

    # =====================================================
    # LOGIN TO DOCKER HUB
    # =====================================================

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # =====================================================
    # TAG DOCKER IMAGE
    # =====================================================

    - name: Tag Docker Image
      run: |
        docker tag smsml-xgboost:v1 \
        ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

    # =====================================================
    # PUSH DOCKER IMAGE
    # =====================================================

    - name: Push Docker Image
      run: |
        docker push \
        ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

    # =====================================================
    # POST LOG IN TO DOCKER HUB
    # =====================================================

    - name: Post Log in to Docker Hub
      run: |
        echo "Docker image successfully pushed"

    # =====================================================
    # COMPLETE JOB
    # =====================================================

    - name: Complete job
      run: |
        echo "CI pipeline completed successfully"

