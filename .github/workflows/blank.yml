name: SMSML Advanced CI Pipeline

on:
  push:
    branches:
      - main
      - feat/monitoring_logging

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:

      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing
        run: |
          python preprocessing/automate_WildanFadhilNazaruddin.py

      - name: Run mlflow project
        run: |
          python Membangun_model/modelling.py

      - name: Get latest MLflow run id
        run: |
          echo "Latest MLflow run:"
          ls -R mlruns/

      - name: Install Python dependencies
        run: |
          pip install docker

      - name: Upload to GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smsml-artifacts
          path: |
            mlruns/
            preprocessing/artifacts/

      - name: Build Docker Model
        run: |
          docker build -t smsml-model .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag smsml-model ${{ secrets.DOCKER_USERNAME }}/smsml-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/smsml-model:latest