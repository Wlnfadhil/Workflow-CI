name: SMSML CI Pipeline

on:
  push:
    branches:
      - main
      - feat/monitoring_logging

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing
        run: |
          python preprocessing/automate_WildanFadhilNazaruddin.py

      - name: Run baseline MLflow training
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: |
          python Membangun_model/modelling.py

      - name: Run hyperparameter tuning
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: |
          python Membangun_model/modelling_tuning.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smsml-artifacts
          path: |
            mlruns/
            preprocessing/artifacts/