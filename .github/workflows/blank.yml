name: SMSML CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  mlops-pipeline:

    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # CHECKOUT REPOSITORY
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================================
      # SETUP PYTHON
      # =====================================================

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =====================================================
      # CHECK ENVIRONMENT
      # =====================================================

      - name: Check Environment
        run: |
          python --version
          pip --version
          pwd
          ls -la

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies
        run: |

          pip install --upgrade pip

          pip install -r requirements.txt

          if [ -f Membangun_model/requirements.txt ]; then
            pip install -r Membangun_model/requirements.txt
          fi

          pip install mlflow
          pip install docker
          pip install virtualenv

      # =====================================================
      # CLEAN OLD ARTIFACTS
      # =====================================================

      - name: Clean Previous Artifacts
        run: |
          rm -rf mlruns || true
          rm -rf mlartifacts || true
          rm -f mlflow.db || true

      # =====================================================
      # RUN PREPROCESSING
      # =====================================================

      - name: Run Preprocessing Pipeline
        run: |
          python preprocessing/automate_WildanFadhilNazaruddin.py

      # =====================================================
      # VERIFY GENERATED DATASETS
      # =====================================================

      - name: Verify Generated Datasets
        run: |

          echo "=== DATASETS ==="

          ls -R preprocessing/artifacts/datasets

      # =====================================================
      # RUN MODELLING
      # =====================================================

      - name: Run MLflow Modelling
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python Membangun_model/modelling.py

      # =====================================================
      # VERIFY GENERATED ARTIFACTS
      # =====================================================

      - name: Verify MLflow Artifacts
        run: |

          echo "=== MLRUNS ==="
          ls -R mlruns

          echo "=== MODEL ARTIFACTS ==="
          find mlruns -type d -name models

      # =====================================================
      # GET LATEST MODEL PATH
      # =====================================================

      - name: Get Latest Model Path
        run: |

          MODEL_PATH=$(find mlruns \
          -type f \
          -name "MLmodel" | tail -n 1)

          MODEL_DIR=$(dirname "$MODEL_PATH")

          echo "MODEL_DIR=$MODEL_DIR" >> $GITHUB_ENV

          echo "Detected Model Directory:"
          echo "$MODEL_DIR"

      # =====================================================
      # VERIFY MODEL REQUIREMENTS
      # =====================================================

      - name: Verify Model Requirements
        run: |

          echo "=== REQUIREMENTS ==="

          cat $MODEL_DIR/requirements.txt

          echo "=== CONDA YAML ==="

          cat $MODEL_DIR/conda.yaml

      # =====================================================
      # UPLOAD ARTIFACTS
      # =====================================================

      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smsml-mlflow-artifacts
          path: |
            mlruns/
            path: |
            mlruns/
            preprocessing/artifacts/

      # =====================================================
      # CLEAN DOCKER CACHE
      # =====================================================

      - name: Clean Docker Cache
        run: |
          docker system prune -af || true

      # =====================================================
      # BUILD DOCKER IMAGE
      # =====================================================

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |

          echo "Building Docker from:"
          echo "$MODEL_DIR"

          mlflow models build-docker \
            -m "$MODEL_DIR" \
            -n "smsml-xgboost:v1" \
            --env-manager local

      # =====================================================
      # LOGIN TO DOCKER HUB
      # =====================================================

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =====================================================
      # TAG DOCKER IMAGE
      # =====================================================

      - name: Tag Docker Image
        run: |

          docker tag smsml-xgboost:v1 \
          ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

      # =====================================================
      # PUSH DOCKER IMAGE
      # =====================================================

      - name: Push Docker Image
        run: |

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

      # =====================================================
      # VERIFY PUSH
      # =====================================================

      - name: Verify Docker Push
        run: |
          echo "Docker image pushed successfully"

      # =====================================================
      # COMPLETE PIPELINE
      # =====================================================

      - name: Complete CI Pipeline
        run: |
          echo "SMSML CI Pipeline completed successfully"