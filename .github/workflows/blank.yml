name: SMSML CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Environment
        run: |
          python --version
          pip --version
          pwd
          ls

      - name: Install Dependencies
        run: |
          pip install --upgrade pip

          pip install -r requirements.txt

          if [ -f Membangun_model/requirements.txt ]; then
            pip install -r Membangun_model/requirements.txt
          fi

      - name: Install MLflow Dependencies
        run: |
          pip install mlflow
          pip install docker
          pip install virtualenv

      - name: Run MLflow Modelling
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python Membangun_model/modelling.py

      - name: Check MLflow Artifacts
        run: |
          ls
          ls mlartifacts || true
          ls mlruns || true

      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smsml-mlflow-artifacts
          path: |
            mlruns/
            mlartifacts/
            preprocessing/artifacts/

      - name: Get Model Path
        run: |
          MODEL_PATH=$(find mlartifacts -type d -path "*/artifacts" | head -n 1)

          echo "MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV

          echo "Detected Model Path:"
          echo $MODEL_PATH

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          mlflow models build-docker \
          -m "$MODEL_PATH" \
          -n "smsml-xgboost:v1" \
          --env-manager local

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag smsml-xgboost:v1 \
          ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

      - name: Verify Docker Push
        run: |
          echo "Docker image pushed successfully"

      - name: Complete CI Pipeline
        run: |
          echo "SMSML CI Pipeline completed successfully"