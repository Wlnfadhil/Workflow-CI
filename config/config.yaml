name: smsml-mlflow-project

conda_env: conda.yaml

entry_points:
  main:
    parameters:
      dataset: {type: str, default: "data/student_performance_data.csv"}

    command: "python Membangun_model/modelling.py --dataset {dataset}"

  tuning:
    parameters:
      dataset: {type: str, default: "data/student_performance_data.csv"}

    command: "python Membangun_model/modelling_tuning.py --dataset {dataset}"