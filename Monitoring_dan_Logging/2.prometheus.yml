global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "smsml_inference_api"

    metrics_path: /metrics

    static_configs:
      - targets:
          - "localhost:8000"

  - job_name: "smsml_exporter"

    metrics_path: /metrics

    static_configs:
      - targets:
          - "localhost:8001"