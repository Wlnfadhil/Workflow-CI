global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:

  - job_name: "smsml-inference-api"

    metrics_path: /metrics

    static_configs:
      - targets:
          - "localhost:8000"

  - job_name: "smsml-prometheus-exporter"

    metrics_path: /metrics

    static_configs:
      - targets:
          - "localhost:8001"